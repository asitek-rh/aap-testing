- name: Set static IP for RHEL VM
  hosts: all
  become: true
  tasks:
    - name: Set static IP address                                                                                                                                                                                                                                 
      ansible.builtin.command: >                                                                                                                                                                                                                                  
        nmcli con mod enp1s0                                                                                                                                                                                                                                      
        ipv4.addresses 192.168.122.33/24                                                                                                                                                                                                                          
        ipv4.gateway 192.168.122.1                                                                                                                                                                                                                                
        ipv4.method manual